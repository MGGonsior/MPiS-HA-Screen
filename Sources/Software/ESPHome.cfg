esphome:
  name: "device-name"
  friendly_name: "Device Name"

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "secret"

ota:
  - platform: esphome
    password: "secret"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Device Fallback Hotspot"
    password: "secret"

captive_portal:
    

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true
  id: bus_a
  frequency: 50kHz

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23

time:
  - platform: sntp
    id: sntp_time
    timezone: "Europe/Warsaw"

font:
  - file: "gfonts://Inter"
    id: font_small
    size: 14
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~°'

  - file: "gfonts://Inter"
    id: font_medium
    size: 16
    glyphs: ' !"#$%&''()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[\]^_`abcdefghijklmnopqrstuvwxyz{|}~°'

  - file: "gfonts://Roboto"
    id: font_large
    size: 64

  - file: "fonts/materialdesignicons-webfont.ttf"
    id: font_mdi
    size: 20
    glyphs:
      - "\U000F0590"
      - "\U000F12D3"
      - "\U000F053D"

image:
  - file: "Icon/dirt.xbm"
    id: icon_dirt
    type: BINARY

bme68x_bsec2_i2c:
  address: 0x76
  model: bme680
  operating_age: 28d
  sample_rate: LP
  supply_voltage: 3.3V

sensor:
  - platform: aht10
    variant: AHT20
    temperature:
      name: "Room AHT20 Temperature"
      id: aht20_temp
      filters:
      - offset: -3.37
    humidity:
      name: "Room AHT20 Humidity"
      id: aht20_hum
    update_interval: 60s

  - platform: bmp280_i2c
    address: 0x77
    update_interval: 60s
    temperature:
      name: "Room BMP280 Temperature"
      id: bmp280_temp
      oversampling: 16x
      filters:
      - offset: -3.7
    pressure:
      name: "Room BMP280 Pressure"
      id: bmp280_press

  - platform: dht
    pin: GPIO2
    model: AM2302
    update_interval: 60s
    temperature:
      name: "Room AM2302 Temperature"
      id: dht_temp
      filters:
      - offset: -2
    humidity:
      name: "Room AM2302 Humidity"
      id: dht_hum

  - platform: bme68x_bsec2
    temperature:
      name: "Room BME680 Temperature"
      id: bme680_temp
      filters:
      - offset: -3.3
    pressure:
      name: "Room BME680 Pressure"
      id: bme680_press
    humidity:
      name: "Room BME680 Humidity"
      id: bme680_hum
    iaq:
      name: "Room BME680 IAQ"
      id: iaq
    co2_equivalent:
      name: "Room BME680 CO2 Equivalent"
      id: bme680_co2
    breath_voc_equivalent:
      name: "Room BME680 Breath VOC Equivalent"

  - platform: homeassistant
    id: players_ha
    entity_id: sensor.ha_players_online
    internal: true

  - platform: homeassistant
    id: ha_temp_out
    entity_id: sensor.outside_temperature
    internal: true

  - platform: homeassistant
    id: ha_temp_garage
    entity_id: sensor.garage_temperature
    internal: true

  - platform: homeassistant
    id: ha_temp_truck
    entity_id: sensor.truck_temperature
    internal: true
  - platform: template
    id: players_parsed
    name: "Players Parsed"
    update_interval: 15s
    lambda: |-
      if (isnan(id(players_ha).state)) {
        return NAN;
      }
      return (float)((int)id(players_ha).state);

display:
  - platform: ssd1322_spi
    id: my_display
    model: "SSD1322 256x64"
    reset_pin: GPIO19
    cs_pin: GPIO5
    dc_pin: GPIO4
    update_interval: 1s
    pages:
      - id: page_clock
        lambda: |-
          it.strftime(128, 32, id(font_large), TextAlign::CENTER, "%H:%M:%S", id(sntp_time).now());


      - id: page_ha_data
        lambda: |-
          float players_f = id(players_parsed).state;
          int players = isnan(players_f) ? -1 : (int)players_f;

          it.image(0, 6, id(icon_dirt));
          if (players == -1) {
            it.printf(26, 8, id(font_medium), "Brak danych");
          } else {
            it.printf(26, 8, id(font_medium), "%d graczy", players);
          }

          it.printf(128, 4, id(font_mdi), "\U000F0590");
          if (isnan(id(ha_temp_out).state)) {
            it.printf(154, 4, id(font_medium), "--.-°C");
          } else {
            it.printf(154, 4, id(font_medium), "%.1f°C", id(ha_temp_out).state);
          }

          it.printf(0, 36, id(font_mdi), "\U000F12D3");
          if (isnan(id(ha_temp_garage).state)) {
            it.printf(26, 36, id(font_medium), "--.-°C");
          } else {
            it.printf(26, 36, id(font_medium), "%.1f°C", id(ha_temp_garage).state);
          }

          it.printf(128, 36, id(font_mdi), "\U000F053D");
          if (isnan(id(ha_temp_truck).state)) {
            it.printf(154, 36, id(font_medium), "--.-°C");
          } else {
            it.printf(154, 36, id(font_medium), "%.1f°C", id(ha_temp_truck).state);
          }

      - id: page_clock_2
        lambda: |-
          it.strftime(128, 32, id(font_large), TextAlign::CENTER, "%H:%M:%S", id(sntp_time).now());

      - id: page_sensors
        lambda: |-
          it.printf(0, 0, id(font_small), "BME680");
          it.printf(70, 0, id(font_small), "%.1f°C", id(bme680_temp).state);
          it.printf(130, 0, id(font_small), "%.1f%%", id(bme680_hum).state);
          it.printf(190, 0, id(font_small), "IAQ: %.0f", id(iaq).state);

          it.printf(0, 16, id(font_small), "BMP280");
          it.printf(70, 16, id(font_small), "%.1f°C", id(bmp280_temp).state);
          it.printf(130, 16, id(font_small), "%.0f hPa", id(bmp280_press).state);

          it.printf(0, 32, id(font_small), "AHT20");
          it.printf(70, 32, id(font_small), "%.1f°C", id(aht20_temp).state);
          it.printf(130, 32, id(font_small), "%.1f%%", id(aht20_hum).state);

          it.printf(0, 48, id(font_small), "AM2302");
          it.printf(70, 48, id(font_small), "%.1f°C", id(dht_temp).state);
          it.printf(130, 48, id(font_small), "%.1f%%", id(dht_hum).state);

interval:
  - interval: 10s
    then:
      - display.page.show_next: my_display
      - component.update: my_display

number:
  - platform: template
    name: "Jasność OLED"
    id: oled_brightness
    optimistic: true
    min_value: 0.0
    max_value: 1.0
    step: 0.1
    on_value:
      then:
        - lambda: |-
            id(my_display).set_brightness(x);
